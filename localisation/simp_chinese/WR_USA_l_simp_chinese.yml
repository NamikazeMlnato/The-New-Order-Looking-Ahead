 USABOOM_news.1:"珍珠港核爆"
 USABOOM_news.1_desc:"今日凌晨，珍珠港锚地升起直径两公里的炽热火球。据多方消息证实，一架涂装铁十字标志的远程轰炸机自赤城号航空母舰起飞，向美国太平洋舰队核心驻地投掷了毁灭性新型武器。夏威夷观测站记录到相当于里氏6.3级的地震波，檀香山全城玻璃幕墙在冲击波中化为齑粉。根据五角大楼的不完全统计，至少三艘战列舰与七艘巡洋舰在核爆中永久性损毁，超过四百架战机未及升空便遭电磁脉冲摧毁。白宫于事件发生12小时后发表声明，宣布本土西海岸已进入一级戒备状态。正在五角大楼召开紧急会议的美军高层透露，正在评估“停战谈判”的必要性。"
