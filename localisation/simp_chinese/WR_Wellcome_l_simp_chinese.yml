 Country_tittle2:"欢迎你游玩§Y钢铁雄心4:新秩序前瞻§!，本mod在游戏内添加了从1936-1945年的TNO发展历史。你可以在这个mod游玩§Y德国§!在二战结束后用和谈事件链体验建立新秩序，当你游玩§Y苏联§!时，你可以在§Y卫国战争失败§!后使用全新的国策树反攻德佬(当然也有可能是解体)。反正主要内容就是西俄战争了，其他的都是手痒瞎做的。\n\n为什么我要做这个mod呢？在某天啊，有一个人叫§Y鸽子§!，他很喜欢§Y土豆§!，他跟我说我想做个mod，然后我说这么nb？要不我给你做个子mod，然后我就做了，他问我是什么内容，我说是点§R小§!东西，然后我发给他我写的企划，他看完我的企划时他说你这TM真是“小”东西？然后我回答是啊小的有点大了。\n\n致谢名单：\n代码-§YFallenStarsSans§!(叮叮)\n美工＆国策设计-§Yxswld_gezi§!(鸽子)\n文本-§Yyangjian§!(阳间)"

 Country_tittle_GER:"1919年，安东·德莱克斯勒在慕尼黑创建§Y德国工人党§!。起初，人们认为这只是战后德国政治中不起眼的微粒。该党在初期的政治竞争中也确实无法与当时德国最大的左翼政党----§Y德国共产党§!匹敌。直到1919年9月，一名留着小胡子的奥地利落榜美术生加入该党。此人凭借出色的口才与动人的演讲迅速使工人党壮大。其名号在整个德意志广为流传。凭借自己的演讲技艺，希特勒在党内迅速积攒名望，并于同年控制工人党。1920年，希特勒和安东·德莱克斯勒共同起草了§Y《二十五点纲领》§!，同年四月改称§Y国家社会主义德意志工人党§!。1921年，随着党内“领袖原则”的确立，希特勒正式出任首领，成立冲锋队。并于1923年发动著名的§Y“啤酒馆暴动”§!，试图推翻魏玛政府。但这次暴动最终以失败收尾，希特勒锒铛入狱。纳粹党的党报被魏玛当局禁止，整个纳粹党的活动来到低谷。希特勒在狱中写下了§Y《我的奋斗》§!一书，该书随后被视为法西斯行动的理论和行动纲领。1925年初，本该服刑5年的希特勒重新出现在纳粹党内。希特勒于同年设立了§Y纳粹党党卫队§!。\n1928-1932年间，该党在国会内的地位跃升至德国第一大党。1933年，希特勒在狂热的军队和垄断资产阶级的拥护下上台。随后，在希特勒的旨意下，纳粹党制造了§Y国会纵火案§!，成功将其诬陷于德国共产党。希特勒顺水推舟解散了共产党，在国会取得了独裁权力。利用国会纵火案后制造的恐怖气氛和对共产党议员的镇压，纳粹胁迫剩余的国会议员通过了§Y《授权法案》§!。该法案授予希特勒内阁为期四年的立法权，包括制定违背宪法的法律。这实质上架空了国会和总统，使希特勒获得了不受制约的独裁权力。在《授权法》的庇护下，纳粹开始系统性地取缔所有反对党。社会民主党被查禁，其他政党被迫解散。到1933年7月，纳粹党宣布德国为§Y一党制§!国家。同时，“一体化”进程席卷全国，所有重要的社会、文化组织都被强制纳入纳粹控制之下或直接解散，取而代之的是纳粹控制的§Y德意志劳工阵线§!。冲锋队的暴力威胁在夺权初期发挥了重要作用，但纳粹需要更“专业”和更忠于希特勒本人的恐怖工具。1933年4月，§Y盖世太保§!成立，由戈林创立，后由希姆莱掌控，成为实施无限制逮捕、拷打和关押的核心机构。同时，希姆莱领导的§Y党卫队§!权力急剧膨胀，逐渐成为纳粹的核心精英组织，不仅负责内部安全，还掌管了集中营系统。\n1934年6月，随着权力巩固，冲锋队首领罗姆及其庞大的SA队伍成为希特勒的潜在威胁。罗姆激进的社会革命主张和SA的无法无天，引发了国防军和实业界的强烈不安。1934年6月30日至7月2日，希特勒在党卫队和国防军支持下发动了§Y“长刀之夜”§!。罗姆及大批SA高层被清洗处决，同时被清除的还有许多希特勒的旧敌。此举彻底消灭了纳粹党内的异己力量，确立了党卫队的核心地位，并赢得了国防军的忠诚。1934年8月2日，年迈的总统兴登堡去世。希特勒早已准备就绪，立即宣布将总统与总理职务合并，自任§Y“元首兼国家总理”§!。同时要求军队和所有官员向“德意志国家和人民的元首”阿道夫·希特勒个人宣誓效忠。此举彻底消除了宪法上最后一位可能的权力制衡者，希特勒成为集党、政、军最高权力于一身的绝对独裁者。\n在稳固了政治权力后，纳粹开始系统性地推行其核心意识形态——极端种族主义，特别是反犹主义。1935年9月，在纳粹党代表大会期间，希特勒下令颁布了§Y《纽伦堡法案》§!。该法案包括《帝国公民法》和《德意志血统及荣誉保护法》，剥夺了犹太人的德国公民权，禁止犹太人与“德意志或其同源血统”的公民通婚或有性关系，并定义了谁是“犹太人”。这标志着纳粹对犹太人的迫害从歧视升级为国家法律层面的系统性剥夺权利和种族隔离。\n至此，在短短两年多的时间内，希特勒和纳粹党通过一系列精心策划的阴谋、暴力、立法和恐怖手段，彻底摧毁了魏玛共和国的民主残余，将整个德国国家机器锻造成服务于纳粹意识形态和个人独裁的恐怖工具。德国完成了向一个极权主义国家的转变，为其后发动第二次世界大战和对欧洲犹太人等进行§Y种族灭绝§!铺平了道路。希特勒在《我的奋斗》中勾勒的蓝图，正在一步步变成现实。"

 Country_tittle_JAP:"1931年9月18日，沈阳城外柳条湖的一声爆炸，撕碎了东北夜晚的宁静。这是关东军参谋们精心策划的阴谋。§Y九一八事变§!爆发了。关东军无视东京政府的犹豫，像脱缰的野马，在短短数月内席卷了整个中国东北。东京的文官内阁，先是若槻礼次郎，后是犬养毅，试图约束军队这头猛兽，却发现命令如同废纸。军部或明或暗地支持着关东军的“独走”，甚至主动为其开脱。1932年3月，一块写着§Y满洲国§!的招牌在长春被匆忙挂起。消息传回日本，报纸欢呼“帝国生命线”的获得，民众被民族主义的狂热裹挟，军部的声望如日中天。这种“下克上”的成功，如同毒药般刺激着更狂热的野心。仅仅一个月后，1932年5月15日，一群年轻的海军军官和陆军士官候补生，高喊着“昭和维新”、“诛杀奸佞”，冲进了首相官邸。首相§Y犬养毅§!——这位试图与蒋介石谈判解决满洲问题、甚至私下表示可以承认中国对东北主权的最后一位政党政治家——倒在血泊中。这就是§Y五一五事件§!。枪声不仅夺去了犬养的生命，更彻底击碎了脆弱的政党政治。凶手在法庭上获得了广泛的同情，判决如同儿戏。从此，首相的职位几乎成了海军大将或陆军大将的专利。政党沦为点缀，政客们噤若寒蝉，生怕成为下一颗子弹的目标。军部，用恐怖和暗杀，宣告了谁才是日本真正的主宰。文官政府的脊梁被打断，军部开始按自己的蓝图重塑日本。思想的牢笼首先被焊死。\n1933年，当国联李顿调查团认定日本为侵略者后，日本代表松冈洋右在日内瓦会场表演般地宣布§Y退出国联§!，转身离去。国际孤立非但没有引起反思，反而在国内点燃了更极端的民族主义烈焰，“日本对抗世界”的悲情叙事被军部和右翼大肆宣扬。紧接着，一场名为§Y国体明征§!的思想整肃运动席卷全国。任何对天皇绝对权力提出学理性质疑的声音——如美浓部达吉教授的“天皇机关说”——都被打成“大逆不道”。他的著作被查禁焚烧，大学教授被迫“转向”或噤声。极端民族主义、对天皇的神化崇拜被奉为不容置疑的信条，从小学课堂开始，用《教育敕语》的经文反复灌输。报纸、广播、电影，所有能发声的渠道，都被套上军国主义的缰绳。在军部内部，一场决定日本未来走向的权力斗争也趋于白热化。以永田铁山、东条英机等头脑冷静的参谋为核心的§Y统制派§!，主张在现有体制框架内，由军部自上而下地掌控国家，建立“高度国防国家”体制，将整个日本变成一部战争机器。他们视财阀为必要的合作者而非打倒对象。而另一派，深受北一辉激进思想影响的§Y皇道派§!，则以荒木贞夫、真崎甚三郎等将领为旗帜，吸引了大量来自底层、对社会不公充满愤怒的青年军官。他们叫嚣着“清君侧”，要求发动“昭和维新”，用暴力铲除财阀、特权阶级和“统制派”这些“国贼”，建立天皇直接领导下的军事独裁。这两派的矛盾，早已超越理念之争，变成你死我活的权力倾轧。\n1935年7月，统制派利用人事权，将皇道派的精神领袖之一、教育总监真崎甚三郎解职。这一举动如同点燃了火药桶。仅仅一个月后，1935年8月12日，狂热的皇道派军官相泽三郎中佐，光天化日之下闯进陆军省军务局局长办公室，用军刀将统制派的核心智囊、军务局长§Y永田铁山§!劈杀。这就是震惊日本的§Y相泽事件§!。相泽在法庭上慷慨陈词，宣扬其“诛杀国贼”的“大义”。这起血腥刺杀，暴露了陆军高层分裂的深度，也预示着更大规模的火山即将喷发。到1936年初，整个日本已被军部牢牢绑上战车。文官政府形同虚设，政党奄奄一息。极端民族主义和军国主义思想钳制着每一个国民的大脑。经济资源被疯狂导向军事扩张，财阀在满洲的巨额利润与军部紧密捆绑，而农村的凋敝则成为激进思潮的温床。退出国联后的日本在国际上孤立无援，与英美等国的矛盾日益尖锐。陆军内部，统制派虽占据优势，但皇道派青年军官的怨毒和躁动已如地火奔涌，他们深信只有用更暴烈的“天诛”，才能“拯救”日本。\n日本这架庞大的战争机器，在统制派的操控下，正在向彻底法西斯化军国主义国家的蜕变。通向全面侵华战争和太平洋战争的道路，将畅通无阻。而1936年早春东京街头的血，将成为日本坠入战争深渊前最刺目的注脚。"

 Country_tittle_USA:"1929年10月，华尔街的崩盘撕碎了“咆哮的二十年代”的幻象。股市的坍塌如同推倒了第一块多米诺骨牌，迅速将整个美国拖入§Y大萧条§!的深渊。工厂烟囱停止冒烟，农场主眼睁睁看着玉米烂在地里也卖不出种子钱，银行一家接一家倒闭，卷走了普通人一生的积蓄。短短几年间，国民财富蒸发近半，四分之一的劳动力——超过一千三百万人——陷入失业的泥潭。饥饿的人群在垃圾堆里翻找食物，“胡佛村”的简陋窝棚在城市边缘蔓延，绝望笼罩着整个国家。激进的思想——论是共产主义还是模仿欧洲的法西斯主义——开始在绝望的人群中找到听众。时任总统赫伯特·胡佛坚信市场的自我修复能力。他拒绝联邦政府进行大规模直接干预，寄望于地方自救和企业家的“自愿合作”。然而，他的主要应对措施——§Y《斯姆特-霍利关税法》§!——本想保护美国产业，却引发了全球贸易战，让经济雪上加霜。他建立的§Y复兴金融公司§!主要贷款给大银行和铁路公司，涓滴未能惠及街头巷尾的失业者。1932年夏天，当数万名一战的§Y退伍金大军§!拖家带口在华盛顿扎营，要求政府提前支付承诺的补助金时，胡佛派遣军队用坦克和刺刀驱散了这些曾经的战士。胡佛的名字，成了大萧条苦难的代名词。\n1933年3月4日，富兰克林·德拉诺·罗斯福在刺骨的寒风中宣誓就职。“我们唯一需要恐惧的，就是恐惧本身”——他的声音通过无线电波传遍全国，注入了一丝久违的希望。§Y罗斯福新政§!随即以雷霆之势展开。最初的§Y百日§!如同旋风：银行紧急停业整顿，经审查合格的被注入信心重新开张；§Y《格拉斯-斯蒂格尔法案》§!建立了§Y联邦存款保险公司§!，终结了挤兑噩梦；美元脱离了金本位，试图刺激出口和物价。联邦政府前所未有地伸出援手：§Y联邦紧急救济署§!向各州拨款救助饥寒交迫的家庭；§Y民间资源保护队§!将百万计年轻人送上山坡植树造林，换取食宿和微薄工资；庞大的§Y公共工程管理局§!开始建造水坝、桥梁、学校、医院，钢铁碰撞的声音成了复苏的序曲。罗斯福的雄心不止于救急。他试图重塑美国经济的基础。§Y《农业调整法》§!付钱给农民让他们少种地、少养猪，力图提升农产品价格，尽管销毁过剩产品引发道德争议）。§Y《全国工业复兴法》§!建立了象征蓝鹰的§Y全国复兴总署§!，鼓励各行业制定“平竞争”法规，设定工资工时标准，并首次在联邦层面保障工人的§Y集体谈判权§!。雄心勃勃的§Y田纳西河流域管理局§!则在南方贫困地区展开史无前例的综合治理工程。\n然而，挑战接踵而至。1935年，最高法院的保守派大法官们接连出手，以违宪为由否决了NIRA和AAA的核心条款，新政遭遇重挫。罗斯福没有退缩。1935年，他推动国会通过了更具深远意义的“第二次新政”。§Y《社会保障法》§!为老年人、失业者、残疾儿童建立起联邦安全网，奠定了现代福利国家的基石。§Y《全国劳工关系法》§!强力保障了工人组织和集体谈判的权利，催生了工会运动的蓬勃壮大。§Y《公用事业控股公司法》§!则试图驯服垄断的电力巨头。这些举措赢得了城市工人、贫困农民、移民和越来越多的非裔美国人的支持，一个强大的§Y新政联盟§!正在形成。但同时，反对声浪也日益高涨：大企业主和保守派指责这是“社会主义”和“独裁”；右翼组织如“自由联盟”猛烈抨击；左翼民粹领袖如休伊·朗和查尔斯·库格林神父则嫌新政不够激进，提出了更具蛊惑力的替代方案。\n1936年，美国迎来了对新政的全公决。罗斯福在竞选中毫不避讳地宣称：“他们团结一致地恨我，我欢迎他们的仇恨！”选举结果是一场地震般的胜利。罗斯福横扫除缅因和佛蒙特之外的所有州，以压倒性优势击败共和党人阿尔夫·兰登。这场选举清晰地宣告：深陷危机的美国人民选择信任罗斯福，信任他领之路，信任在民主框架内进行激进而和平的变革。当德意日滑向法西斯深渊时，深陷大萧条的美国，通过选票而非子弹，艰难地重塑着自身，证明了其民主制度在极端压力下依然能焕发生机。\n尽管经济尚未完全复，尽管最高法院的挑战依然悬而未决，但在1936年，美国已经避开了最黑暗的深渊，在罗斯福的带领下，正沿着一条前所未有的、政府深度介入的社会经济改革之路蹒跚前行。"

 Country_tittle_SOV:"1917年11月7日，俄历10月，在伟大的革命导师§Y列宁§!和久经考验的§Y布尔什维克党§!领导下，彼得格勒的工人、士兵和水兵以雷霆万钧之势推翻了腐朽的资产阶级临时政府。§Y伟大的十月社会主义革命§!胜利了！这是人类历史新纪元的曙光，第一次将科学社会主义的蓝图付诸实践，建立了世界上第一个工农社会主义国家——§Y苏维埃俄国§!。年轻的苏维埃政权甫一诞生，便面临着帝国主义列强的疯狂围剿和国内反革命势力的垂死挣扎。为了保卫革命果实，在列宁和党的英明决策下，苏维埃俄国以非凡的勇气暂时签订了§Y《布列斯特和约》§!，赢得了宝贵的喘息时机。然而，国内外敌人不甘心失败，勾结起来发动了血腥的§Y国内战争§!。在§Y托洛茨基§!同志卓有成效的组织下，英勇的§Y红军§!在广大工农群众的支持下，以钢铁般的意志和崇高的牺牲精神，粉碎了白卫军和十四国武装干涉的联合进攻，捍卫了苏维埃政权！为了应对极端困难，党果断实施了§Y战时共产主义政策§!，确保了前线的供给和后方的秩序，为最终胜利奠定了基础。\n内战胜利后，国家满目疮痍。伟大的列宁同志高瞻远瞩，于1921年创造性地提出了§Y新经济政策§!。这一政策迅速恢复了国民经济，稳定了社会秩序，改善了工农生活，展现了社会主义制度的灵活性和生命力。1922年12月30日，在列宁同志的直接关怀和指导下，各苏维埃共和国在自愿、平等的基础上结成了牢不可破的联盟——§Y苏维埃社会主义共和国联盟§!，这是无产阶级国际主义的伟大胜利！同年，忠诚的斯大林同志被任命为党的§Y总书记§!，为党和国家事业的进一步发展提供了坚强的组织保障。\n1924年1月21日，世界无产阶级的革命领袖列宁同志不幸逝世，这是苏联人民和国际共运的巨大损失。全党、全国人民化悲痛为力量，紧密团结在列宁主义的旗帜下。在斯大林同志的卓越领导下，苏联共产党清除了托洛茨基、季诺维也夫、加米涅夫等反党集团，他们妄图否定§Y一国建成社会主义§!的列宁主义路线，散布失败主义和投降主义，企图将苏联引向歧途。党及时揭露并粉碎了他们的阴谋，维护了党的团结和统一。布哈林等人提出的维护富农利益、延缓工业化的右倾机会主义路线也受到了党的坚决批判。斯大林同志以其深邃的马克思列宁主义理论修养和坚定的无产阶级立场，赢得了全党和全国人民的衷心拥护，成为列宁事业的当之无愧的继承者。\n为了将苏联从一个落后的农业国迅速转变为强大的社会主义工业国，捍卫革命成果并支援世界革命，在斯大林同志的亲自倡议和领导下，苏联于1928年启动了人类历史上第一个宏伟的§Y国民经济五年计划§!。同时，为了彻底改造分散落后的小农经济，奠定社会主义农业的基础，党领导亿万农民开展了轰轰烈烈的§Y农业集体化§!运动。广大贫下中农热烈响应党的号召，积极加入§Y集体农庄§!和§Y国营农场§!。尽管有少数富农分子进行破坏和反抗，但他们的阴谋在觉悟了的农民群众和苏维埃政权的强大力量面前被彻底粉碎。集体化运动从根本上铲除了农村的剥削根源，解放了农业生产力，为工业化提供了必需的粮食和原料。在工业化战线上，苏联工人阶级以主人翁的姿态，发扬了前所未有的§Y劳动英雄主义§!精神。在党的号召下，全国上下万众一心，克服了难以想象的困难。巨大的§Y第聂伯河水电站§!、§Y马格尼托哥尔斯克钢铁厂§!、§Y乌拉尔机械厂§!等一座座社会主义工业的丰碑在辽阔的国土上拔地而起！第一个五年计划以令人惊叹的速度提前完成，工业产值尤其是重工业实现了飞跃性增长，苏联一跃成为世界工业强国！第二个五年计划继续高歌猛进，着重于技术改造和填补空白，社会主义经济基础日益雄厚。在社会主义建设凯歌高奏的同时，帝国主义间谍和国内残余的反革命分子加紧了破坏活动。\n1934年12月1日，党的忠诚战士、列宁格勒州委书记§Y基洛夫§!同志不幸被敌人暗杀。这一卑鄙罪行激起了全党和全国人民的无比愤慨。在斯大林同志和党中央的坚强领导下，苏联人民掀起了捍卫社会主义成果、肃清反革命分子的斗争。§Y内务人民委员部§!在叶若夫同志的领导下，依靠广大工农群众，成功地揭露和粉碎了托洛茨基-季诺维也夫反苏联合中心等暗藏的反革命集团，他们妄图颠覆苏维埃政权、复辟资本主义、勾结外国势力。这场必要的斗争纯洁了党和苏维埃的队伍，巩固了无产阶级专政，保障了社会主义建设的顺利进行，极大地增强了党和人民的团结。\n1936年，在列宁斯大林党的英明领导下，苏联已从一个落后的农业国，依靠社会主义制度的优越性和苏联人民的伟大创造力，克服了国内外敌人的重重阻挠，奇迹般地转变为一个强大的社会主义工业国。一个没有剥削和压迫、各族人民平等团结、充满蓬勃生机的新社会已经展现在世界面前。苏联的国力空前增强，为即将到来的伟大卫国战争奠定了坚实的物质、政治和精神基础，也为全世界被压迫人民争取解放的斗争树立了光辉的榜样。社会主义的旗帜在六分之一的土地上高高飘扬，指引着人类前进的方向！"

 Country_tittle_CHI:"1911年10月10日，武昌城头的一声枪响，点燃了埋葬千年帝制的燎原之火。§Y辛亥革命§!以超乎想象的速度席卷南方，腐朽的清王朝在仓促中土崩瓦解。1912年元旦，§Y中华民国§!在南京宣告成立，§Y孙中山§!被推举为临时大总统。然而，手握北洋新军的实力派§Y袁世凯§!，凭借武力与权谋，迫使革命党人妥协，在北京就任民国首任正式大总统。宋教仁于1913年3月于上海火车站遇刺身亡。血案撕破了民主的假面，孙中山愤而发动§Y二次革命§!，但迅即被袁世凯的北洋军镇压。袁世凯的野心不止于此。\n1915年，他悍然§Y称帝§!，改元“洪宪”。此举瞬间点燃了全国的反抗怒火。孙中山发表《讨袁檄文》，西南军阀§Y蔡锷§!率先在云南举起护国大旗，各省纷纷响应。袁世凯在做了83天皇帝梦后，于1916年6月忧惧病死。然而，他留下的不是统一，而是一个权力真空的深渊。他精心打造的北洋军阀集团四分五裂，为争夺北京中央政权，展开了长达十余年的§Y军阀混战§!。大大小小的军阀割据一方，国家法统荡然无存，宪政沦为军阀手中的玩物。民生凋敝，哀鸿遍野。孙中山在南方坚持奋斗。他先后发起§Y护法运动§!，试图维护《临时约法》的尊严，在广州建立革命政权。然而，他手中缺乏可靠的武装力量，只能依靠反复无常的南方军阀如陆荣廷、唐继尧等，屡遭挫折。革命事业陷入低谷。\n1919年的§Y五四运动§!，以“外争国权，内惩国贼”为口号，展现了新兴知识阶层和工人阶级的力量，也促进了马克思主义在中国的传播。这给困境中的孙中山带来了新的启示。在苏联和中国共产党的帮助下，孙中山决心改组国民党。1924年1月，§Y中国国民党第一次全国代表大会§!在广州召开，确立了“联俄、联共、扶助农工”的§Y三大政策§!，国共实现第一次合作。以苏联为蓝本的黄埔军校建立，§Y蒋介石§!出任校长，一支属于革命党的新式武装——§Y党军§!开始孕育。1925年3月，孙中山病逝于北京，留下“革命尚未成功，同志仍须努力”的遗训。国民党内权力重组，汪精卫、胡汉民、廖仲恺等元老各有拥趸，掌握军权的蒋介石地位迅速上升。同年7月，广州国民政府成立。\n1926年7月，在国共合作的高潮中，蒋介石就任国民革命军总司令，誓师§Y北伐§!。北伐军以“打倒列强，除军阀”为口号，势如破竹。吴佩孚在两湖战场崩溃，孙传芳在江西惨败，革命浪潮席卷长江流域。1927年3月，北伐军攻克上海、南京。然而，胜利的凯歌中暗藏杀机。国民党内部对共产党力量壮大的恐惧、与江浙财阀和列强的妥协意愿急剧上升。1927年4月12日，蒋介石在上海发动§Y政变§!，对昔日盟友共产党人及其领导的工人武装举起了屠刀，国共合作彻底破裂。白色恐怖笼罩南方，共产党人被迫转入地下或走向农村。1928年，蒋介石联合冯玉祥、阎锡山、李宗仁等地方实力派继续北伐。6月，北伐军进入北京。年底，奉系张学良在东北宣布§Y改旗易帜§!，归顺南京国民政府，蒋介石作为国民党和国民政府的最高领袖地位得以确立。至此，至少在名义上，南京国民政府完成了对全国的统一。接下来的十年，被称为民国建设的§Y黄金十年§!。但是国家的统一徒有其表。蒋介石的南京中央政府实际有效控制区域主要限于长江中下游数省。地方实力派如山西的阎锡山、广西的李宗仁白崇禧、西北的冯玉祥、广东的陈济棠，乃至名义归顺的东北张学良，都保持着强大的半独立性。\n1931年9月18日，日本关东军制造§Y九一八事变§!，侵占中国东北。蒋介石政府寄望于“国联”调停，采取不抵抗政策，致使东北三省迅速沦陷。1932年，日军又在上海挑起§Y一二八事变§!。1933年，日军进犯热河、长城各口，中国军队在§Y长城抗战§!中英勇阻击，最终仍被迫签订§Y《塘沽协定》§!，承认了日本对东北的占领。1935年，日本又制造§Y华北事变§!，通过条约迫使国民党中央势力退出河北、察哈尔两省，策划“华北五省自治运动”，华北主权名存实亡。\n南京政府的统治基础建立在城市资产阶级、地主乡绅和部分知识分子之上。广大农村地区，土地兼并严重，地主剥削残酷，赋税沉重，天灾人祸频发，农民生活困苦不堪。国民党虽口称“平均地权”，但未能推行有效的土地改革。城市工人受到资本家和帮会的双重压榨，罢工浪潮时有发生。政府的腐败、低效和特务统治加剧了社会的不满。知识界在高压与救亡的双重压力下，分化与争论不断。鲁迅的杂文犹如匕首，刺穿着时代的黑暗与国民性的痼疾。到1936年，中华民国在名义上统一已近八年。南京城内，政府大楼矗立，新修的公路延伸，法币开始流通，呈现些许现代气象。然而，国家肌体内部千疮百孔：中央权威被地方割据严重削弱；剿共的硝烟仍在西北弥漫；日本侵略者的刺刀已抵近北平城下；亿万农民在贫困中挣扎；城市在繁荣的表象下涌动着不安。蒋介石仍坚信“攘外必先安内”，调集重兵意图对立足陕北的红军进行最后一击。\n此时的中国，如同一个巨大的火药桶，民族存亡的危机与国内政治的矛盾交织在一起，濒临爆发的临界点。在张学良的策划下，将彻底改变这个国家命运的风暴——§Y西安事变§!正在酝酿，它将迫使这个饱经磨难的民族，直面那最凶险也最迫切的敌人。黎明前的黑暗，从未如此沉重。"

 Country_tittle_PRC:"1921年7月，上海法租界望志路106号，一群平均年龄仅28岁的知识分子秘密集会。§Y中国共产党§!在此诞生。这个以§Y马克思列宁主义§!为信仰、以§Y推翻资产阶级政权§!、§Y建立无产阶级专政§!、最终实现§Y共产主义§!为纲领的年轻政党，在军阀混战、民不聊生的旧中国悄然登上了历史舞台。初创的共产党力量微弱，成员多为知识分子和青年学生。他们将目光投向了正在兴起的中国工人阶级。在他们的领导下，工人运动风起云涌，展现了新兴阶级的力量，也付出了血的代价。\n1923年，在共产国际的推动下，中共决定与寻求革命力量的§Y中国国民党§!进行合作。1924年1月，§Y国民党第一次全国代表大会§!在广州召开，标志着§Y第一次国共合作§!正式形成。共产党员以个人身份加入国民党。孙中山提出“联俄、联共、扶助农工”的§Y三大政策§!，赋予了合作以政治基础。在苏联援助下，§Y黄埔军校§!建立，周恩来等共产党人参与政治工作，为国共两党培养了一批军事骨干。北伐战争期间，共产党人深入发动工农群众，组织工会农会，有力地支援了国民革命军向长江流域的胜利进军。上海工人三次武装起义，特别是第三次起义的成功，彰显了共产党领导下的群众力量。然而，革命的狂飙突进中暗流汹涌。\n1927年4月12日，掌握军权的§Y蒋介石§!在上海悍然发动§Y政变§!，对昔日的盟友共产党举起了屠刀。随后，汪精卫在武汉发动§Y七一五分共§!。白色恐怖笼罩全国，大批共产党员和革命群众被屠杀。陈独秀的右倾机会主义错误被指为未能有效应对危机的原因之一。第一次国共合作彻底破裂，年轻的共产党遭受了近乎毁灭性的打击。血的教训迫使共产党人独立探索生存与革命的道路。\n1927年8月1日，周恩来、贺龙、叶挺、朱德、刘伯承等领导部分北伐军在§Y南昌§!发动武装起义，打响了武装反抗国民党的第一枪，标志着中共独立领导革命战争、创建人民军队的开始。8月7日，中共中央在汉口召开紧急会议，确定了§Y土地革命§!和§Y武装起义§!的总方针，毛泽东在会上提出了“枪杆子里面出政权”的著名论断。会后，秋收时节，毛泽东在湘赣边界领导了§Y秋收起义§!。起义受挫后，毛泽东审时度势，放弃攻打长沙的计划，率领剩余部队转向敌人统治薄弱的§Y罗霄山脉§!中段，于1927年10月抵达§Y井冈山§!，建立了第一个农村革命根据地。1928年4月，朱德、陈毅率领南昌起义余部和湘南起义农军到达井冈山，与毛泽东部会师，组建了§Y工农革命军第四军§!，朱德任军长，毛泽东任党代表，§Y农村包围城市，武装夺取政权§!的中国革命新道路开始形成。在毛泽东、朱德等的领导下，井冈山根据地开展了打土豪、分田地的土地革命，建立了苏维埃政权。红军在反“进剿”、“会剿”中运用游击战术，屡次战胜强敌。1929年1月，为打破敌人封锁和解决经济困难，红四军主力离开井冈山，向赣南、闽西进军，开辟了更广阔的§Y中央革命根据地§!。同年12月，在福建上杭§Y古田§!召开的红四军第九次党代会，确立了思想建党、政治建军的原则。\n1931年11月，在江西瑞金召开了§Y中华苏维埃第一次全国代表大会§!，宣布成立§Y中华苏维埃共和国临时中央政府§!，毛泽东当选为主席。这是中国共产党领导建立的第一个全国性的工农民主政权。革命力量的壮大引起了国民党南京政府的极度恐慌。蒋介石视其为“心腹之患”，在结束中原大战后，自1930年底至1934年秋，对中央苏区发动了规模一次比一次更大的五次军事“§Y围剿§!”。前四次反“围剿”在正确的领导下，运用灵活机动的战略战术，成功粉碎了敌人的进攻。然而1933年9月的第五次反“围剿”，中共临时中央负责人§Y博古§!和共产国际军事顾问§Y李德§!掌握了军事指挥权。他们排斥毛泽东的主张，推行§Y御敌于国门之外§!的冒险方针，与装备精良的敌人打阵地战、消耗战。红军虽英勇奋战，但损失惨重，根据地日益缩小。至1934年9月，中央苏区已难以为继。\n1934年10月，中共中央和中央红军主力约8.6万人，被迫撤离中央苏区，开始了§Y战略转移§!——§Y长征§!。长征初期，博古、李德指挥失措，在突破敌人四道封锁线后，兵力锐减至3万余人。党和红军陷入空前危机。1935年1月，红军攻占贵州§Y遵义§!。在此生死存亡关头，中共中央召开了§Y遵义会议§!。会议集中解决了当时具有决定意义的军事和组织问题，批判了博古、李德在军事指挥上的严重错误，肯定了毛泽东关于红军作战的基本原则。增选毛泽东为中央政治局常委。决定由张闻天代替博古负总责，毛泽东协助周恩来负责军事指挥。遵义会议确立了毛泽东在党中央和红军中的实际领导地位。遵义会议后，在毛泽东等同志的指挥下，红军一改被动局面，展开了机动灵活的运动战。，战胜了恶劣的自然环境和敌人的重重堵截。1935年6月，中央红军在四川懋功与来自川陕苏区的§Y红四方面军§!会师。会师后，党中央确定了§Y北上§!建立川陕甘根据地的战略方针。党中央率红一方面军主力北上，于1935年10月抵达陕北吴起镇，与§Y陕北红军§!成功会师。\n此时的中国，如同一个巨大的火药桶，民族存亡的危机与国内政治的矛盾交织在一起，濒临爆发的临界点。在张学良的策划下，将彻底改变这个国家命运的风暴——§Y西安事变§!正在酝酿，它将迫使这个饱经磨难的民族，直面那最凶险也最迫切的敌人。黎明前的黑暗，从未如此沉重。"

 Country_tittle_OMS:"这是黑色联盟的简介"
